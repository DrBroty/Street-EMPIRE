<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Character Generator</title>

<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1a1a1a, #0d0d0d);
        color: #fff;
    }

    .container {
        max-width: 900px;
        margin: 40px auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .card {
        background: #161616;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 0 20px rgba(0,255,150,0.05);
    }

    h2 {
        margin-top: 0;
        color: #00ff99;
    }

    label {
        font-size: 14px;
        opacity: 0.8;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin: 6px 0 12px 0;
        border-radius: 8px;
        border: none;
        background: #0f0f0f;
        color: #fff;
        outline: none;
        transition: 0.2s;
    }

    input:focus, select:focus {
        box-shadow: 0 0 10px rgba(0,255,150,0.3);
    }

    .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    .btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
    }

    .generate {
        background: linear-gradient(45deg, #00ff99, #00ccff);
        color: #000;
    }

    .download {
        background: #222;
        color: #00ff99;
        border: 1px solid #00ff99;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,255,150,0.2);
    }

    .preview {
        background: #0f0f0f;
        border-radius: 10px;
        padding: 15px;
        font-family: monospace;
        font-size: 13px;
        overflow-x: auto;
    }

    .id-box {
        background: #0f0f0f;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 10px;
        font-size: 14px;
        color: #00ff99;
    }

    .title {
        text-align: center;
        margin-top: 20px;
        font-size: 28px;
        color: #00ff99;
        text-shadow: 0 0 10px rgba(0,255,150,0.3);
    }
</style>
</head>

<body>

<div class="title">Character JSON Generator</div>

<div class="container">

    <!-- LEFT: FORM -->
    <div class="card">
        <h2>Character Daten</h2>

        <div class="id-box">
            ID: <span id="liveID">-</span>
        </div>

        <label>Name</label>
        <input type="text" id="name" placeholder="Marcus 'Ghost'" oninput="updateID()">

        <label>Rarity</label>
        <select id="rarity">
            <option value="common">Common</option>
            <option value="rare">Rare</option>
            <option value="epic">Epic</option>
            <option value="legendary">Legendary</option>
        </select>

        <div class="row">
            <div>
                <label>Strength</label>
                <input type="number" id="strength" value="50">
            </div>
            <div>
                <label>Intelligence</label>
                <input type="number" id="intelligence" value="50">
            </div>
        </div>

        <div class="row">
            <div>
                <label>Agility</label>
                <input type="number" id="agility" value="50">
            </div>
            <div>
                <label>Leadership</label>
                <input type="number" id="leadership" value="50">
            </div>
        </div>

        <button class="btn generate" onclick="generateJSON()">JSON generieren</button>
        <button class="btn download" onclick="downloadJSON()">Download .json</button>
    </div>

    <!-- RIGHT: PREVIEW -->
    <div class="card">
        <h2>Live Vorschau</h2>
        <div class="preview" id="output">{ }</div>
    </div>

</div>

<script>
let currentJSON = {};

function generateID(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
    }
    return Math.abs(hash % 100000);
}

function generateImage(name) {
    return name.toLowerCase().replace(/[^a-z0-9]/g, "_") + ".png";
}

function updateID() {
    const name = document.getElementById("name").value;
    document.getElementById("liveID").textContent = name ? generateID(name) : "-";
}

function generateJSON() {
    const name = document.getElementById("name").value;

    if (!name) {
        alert("Name fehlt!");
        return;
    }

    const data = {
        id: generateID(name),
        name: name,
        rarity: document.getElementById("rarity").value,
        image: generateImage(name),
        strength: +document.getElementById("strength").value,
        intelligence: +document.getElementById("intelligence").value,
        agility: +document.getElementById("agility").value,
        leadership: +document.getElementById("leadership").value
    };

    currentJSON = data;

    document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);
}

function downloadJSON() {
    if (!currentJSON.name) {
        alert("Erst generieren!");
        return;
    }

    const blob = new Blob(
        [JSON.stringify(currentJSON, null, 2)],
        { type: "application/json" }
    );

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = currentJSON.image.replace(".png", ".json");
    a.click();
}
</script>

</body>
</html>
